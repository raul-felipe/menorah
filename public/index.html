<body>
<div id="message">

    <h2>Olá</h2>
    <h1>Esse é o site para mandar mensagens para o app Menorah!!!</h1>
    <div>

        <input id="titulo" class="form-control" placeholder="Titulo (opcional)">
        <input id="mensagem" class="form-control" placeholder="Mensagem">
        <label>tipo de usuário: </label>
        <select id="usuario">
            <option value="comum">comum</option>
            <option value="membro">membro</option>
            <option value="lider">lider</option>
        </select>
        <button id="btn" type="submit" class="btn btn-default">Enviar</button>
    </div>


</div>

<script>
    var config = {
        apiKey: "AIzaSyCxHMWJ_J1MCU6JLQeNnctaxfDyO9jLkHs",
        authDomain: "batistamenorah-88af8.firebaseapp.com",
        databaseURL: "https://batistamenorah-88af8.firebaseio.com/",
        storageBucket: "batistamenorah-88af8.appspot.com"
    };
    firebase.initializeApp(config);

    $(document).ready(function(){
        $('#btn').click(function(){
            var titulo = $('#titulo').val();
            var mensagem = $('#mensagem').val();
            var usuario = $('#usuario').val();

            firebase.database().ref('/mensagem').update({
                check: false
            }, function(error){
                if(error){

                }else {
                    firebase.database().ref('/mensagem').update({
                        conteudo: mensagem,
                        titulo: titulo,
                        usuario: usuario
                    }, function(error) {
                        if (error) {
                            // The write failed...
                        } else {
                            // Data saved successfully!
                            firebase.database().ref('/mensagem').update({
                                check: true
                            });
                        }
                    });
                }
            });
        });
    });
</script>
